<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – TN OPPORTUNE</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">
  <nav class="top-nav">
    <a href="index.html" class="nav-brand">TN OPPORTUNE</a>
    <div class="nav-user">
      <button type="button" class="theme-toggle-btn" id="themeToggle" aria-label="Toggle theme">
        <span id="themeToggleIcon">🌙</span>
      </button>
      <a href="register.html">Register</a>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-hero">
      <div class="auth-hero-text">
        <h1>TN OPPORTUNE</h1>
        <p>Tamil Nadu Government Schemes &amp; Jobs Portal</p>
      </div>
      <div class="auth-card glass">
        <h2>Government Login</h2>
        <p class="auth-subtitle">Secure access to Tamil Nadu Government Schemes &amp; Jobs portal.</p>
        <form id="loginForm">
          <label for="loginEmail">Email</label>
          <div class="input-with-icon">
            <span class="input-icon">@</span>
            <input type="email" id="loginEmail" placeholder="you@example.com" required />
          </div>

          <label for="loginPassword">Password</label>
          <div class="input-with-icon">
            <span class="input-icon">••</span>
            <input type="password" id="loginPassword" placeholder="Enter your password" required />
          </div>

          <fieldset class="auth-role-group">
            <legend>Login as</legend>
            <div class="role-toggle">
              <label class="role-toggle-option">
                <input type="radio" name="role" value="user" checked />
                <span>User</span>
              </label>
              <label class="role-toggle-option">
                <input type="radio" name="role" value="admin" />
                <span>Admin</span>
              </label>
            </div>
          </fieldset>

          <button type="submit" class="auth-submit-btn">Login</button>
        </form>
        <div class="auth-footer-link">
          Don't have an account? <a href="register.html">Register</a>
        </div>
      </div>
    </div>
  </main>

  <script src="auth.js"></script>
</body>
</html>
